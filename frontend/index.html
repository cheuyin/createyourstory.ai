<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreateYourStory.ai</title>
  <!-- Flowbite theme bootstrap: apply persisted/OS mode before paint so the
         first DarkThemeToggle click is never a no-op and to avoid a flash. -->
  <script>
    try {
      var storageMode = window.localStorage.getItem("flowbite-theme-mode");
      var isStorageModeValid =
        storageMode === "light" ||
        storageMode === "dark" ||
        storageMode === "auto";
      var resolvedMode = (isStorageModeValid ? storageMode : null) || "auto";
      var computedMode =
        resolvedMode === "auto"
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light"
          : resolvedMode;
      if (computedMode === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
      localStorage.setItem("flowbite-theme-mode", resolvedMode);
    } catch (e) { }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
